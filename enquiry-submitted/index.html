<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Favicon -->
<link rel="icon" type="image/png" href="SVG.png" />
<link rel="shortcut icon" type="image/png" href="SVG.png" />
<link rel="apple-touch-icon" href="SVG.png" />
  <title>Thank You | Growitharshiee</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-bg: #f3f4f6; 
      --color-surface: #ffffff;
      --color-primary: #0f4c81;
      --color-accent: #d97706;
      --color-text: #0f172a;
      --color-text-muted: #475569;
      --bg-grid: rgba(11, 59, 99, 0.05); 
      --radius-lg: 18px;
      --radius-pill: 999px;
      --shadow-soft: 0 12px 24px rgba(15, 23, 42, 0.06);
      --font-heading: "Poppins", sans-serif;
      --font-body: "Inter", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-bg);
      /* Finance Grid Background */
      background-image: 
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    /* Abstract Market Trendline SVG Background */
    .finance-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1; /* Behind the card but on the grid */
      opacity: 0.6;
      pointer-events: none;
    }

    .thank-you-card {
      background: var(--color-surface);
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: var(--radius-lg);
      padding: 3.5rem 2rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-soft);
      position: relative;
      z-index: 10; /* Above the trendline */
      opacity: 0;
      transform: translateY(25px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .thank-you-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Gold accent bar like your website cards */
    .thank-you-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--color-accent);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .icon-circle {
      width: 60px;
      height: 60px;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--color-primary);
    }

    h1 span {
      background: linear-gradient(120deg, #f5c461, #f97316);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      color: var(--color-text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5c461, #f97316); 
      color: #111827;
      padding: 0.85rem 2.2rem;
      border-radius: var(--radius-pill);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
      border: none;
      cursor: pointer;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(249, 115, 22, 0.3);
      filter: brightness(1.05);
    }
  </style>
</head>
<body>

  <svg class="finance-bg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    <path d="M0,800 Q150,600 250,700 T500,400 T750,500 T1000,200 L1000,1000 L0,1000 Z" fill="rgba(11, 59, 99, 0.03)"></path>
    <polyline points="0,800 150,600 250,700 500,400 750,500 1000,200" fill="none" stroke="rgba(11, 59, 99, 0.15)" stroke-width="2"></polyline>
    <polyline points="0,900 200,850 400,900 600,600 800,800 1000,400" fill="none" stroke="rgba(15, 23, 42, 0.05)" stroke-width="1"></polyline>
  </svg>

  <div class="thank-you-card" id="card">
    <div class="icon-circle">✓</div>
    <h1>Thank you for choosing <span>Growitharshiee.</span></h1>
    <p>
      Your enquiry has been received successfully. <br>
      <strong>Harshiee</strong> will get back to you within one business day.
    </p>
    
    <a href="https://harshiee-s.github.io/growitharshiee-financial-services/" class="btn-home">
      Back to Home
    </a>
  </div>

  <script>
    window.addEventListener('load', () => {
      // Small delay for a smoother intro
      setTimeout(() => {
        document.getElementById('card').classList.add('active');
      }, 100);
    });
  </script>

</body>
</html>
