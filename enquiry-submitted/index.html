<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="SVG.png" />
  <link rel="shortcut icon" type="image/png" href="SVG.png" />
  <link rel="apple-touch-icon" href="SVG.png" />
  <title>Thank You | Growitharshiee</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Premium Light Theme Variables */
      --primary: #0A2540;
      --primary-soft: rgba(10, 37, 64, 0.07);
      --accent: #D4AF37;
      --accent-soft: rgba(212, 175, 55, 0.13);
      --accent-gradient: linear-gradient(135deg, #E6C265, #D4AF37);
      --bg: #f4f6f9;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #5a6a82;
      --border: rgba(10, 37, 64, 0.15);
      --shadow-glass: 0 16px 40px rgba(10, 37, 64, 0.08);
      
      --radius-lg: 16px;
      --radius-pill: 999px;
      
      --font-heading: "Playfair Display", serif;
      --font-body: "Poppins", sans-serif;
      --font-read: "Inter", sans-serif;
      --transition: 0.28s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-read);
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated Sweeping Lines Background */
    .dgv-background {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0; pointer-events: none; opacity: 0.7;
    }
    .dgv-background svg { width: 100%; height: 100%; }
    .dgv-line {
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 4000; stroke-dashoffset: 4000;
      animation: drawDGV 15s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }
    .dgv-line-1 { stroke: var(--accent); stroke-width: 3px; opacity: 0.5; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.6)); }
    .dgv-line-2 { stroke: var(--primary); stroke-width: 1.5px; opacity: 0.15; animation-delay: -5s; }
    .dgv-line-3 { stroke: var(--accent); stroke-width: 1px; opacity: 0.3; animation-delay: -10s; }
    
    @keyframes drawDGV { 
      0% { stroke-dashoffset: 4000; } 
      100% { stroke-dashoffset: 0; } 
    }

    /* Glassmorphism Thank You Card */
    .thank-you-card {
      /* Frosted glass effect */
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      
      border-radius: var(--radius-lg);
      padding: 3.5rem 2.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-glass);
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .thank-you-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Gold accent bar at the top */
    .thank-you-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--accent-gradient);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    /* Brand Logo Styling */
    .brand-logo {
      height: 48px;
      width: auto;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    .icon-circle {
      width: 56px;
      height: 56px;
      background: var(--surface);
      color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.2rem;
      box-shadow: 0 4px 16px var(--accent-soft);
      border: 1px solid var(--border);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: var(--primary);
    }

    h1 span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      font-family: var(--font-read);
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-gradient); 
      color: var(--primary);
      padding: 0.85rem 2.2rem;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all var(--transition);
      box-shadow: 0 4px 16px var(--accent-soft);
      border: none;
      cursor: pointer;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(212, 175, 55, 0.3);
      filter: brightness(1.04);
    }
  </style>
</head>
<body>

  <!-- Animated SVG Background -->
  <div class="dgv-background">
    <svg viewBox="0 0 1440 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path class="dgv-line dgv-line-1" d="M-100,750 C150,650 300,500 650,450 C1000,400 1200,200 1500,100" />
      <path class="dgv-line dgv-line-2" d="M-100,800 C250,700 450,550 800,500 C1100,450 1300,300 1500,150" />
      <path class="dgv-line dgv-line-3" d="M-100,850 C350,750 550,650 900,550 C1250,450 1400,350 1500,200" />
    </svg>
  </div>

  <div class="thank-you-card" id="card">
    <!-- Inserted Logo -->
    <img src="logo.png" alt="Growitharshiee Logo" class="brand-logo">
    
    <div class="icon-circle">✓</div>
    <h1>Thank you for choosing <br><span>Growitharshiee.</span></h1>
    <p>
      Your enquiry has been received successfully. <br>
      <strong>Harshiee</strong> will get back to you within one business day.
    </p>
    
    <a href="https://harshiee-s.github.io/growitharshiee-financial-services/" class="btn-home">
      Back to Home
    </a>
  </div>

  <script>
    window.addEventListener('load', () => {
      // Small delay for a smoother intro
      setTimeout(() => {
        document.getElementById('card').classList.add('active');
      }, 150);
    });
  </script>

</body>
</html>
